<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משיכת נתוני מניות - מערכת פיננסית חכמה</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Heebo', 'sans-serif'],
                    },
                    colors: {
                        trading: {
                            bg: '#0b1121',       // רקע כללי כהה מאוד
                            card: '#1e293b',     // רקע הכרטיסייה
                            primary: '#3b82f6',  // כחול מקצועי
                            success: '#10b981',  // ירוק מניות (עולה)
                            danger: '#ef4444',   // אדום מניות (יורד)
                            textBase: '#f8fafc', // טקסט ראשי בהיר
                            textMuted: '#94a3b8',// טקסט משני משותק
                            border: '#334155',   // גבולות עדינים
                            input: '#0f172a'     // רקע לשדות הזנה
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* הסתרת אייקון היומן המובנה של הדפדפן בעיצוב הכהה (אופציונלי אך נראה טוב יותר) */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-trading-bg text-trading-textBase font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="bg-trading-card rounded-2xl shadow-2xl w-full max-w-lg p-8 border border-trading-border relative overflow-hidden">
        
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-trading-primary to-trading-success"></div>

        <div class="mb-8 text-center mt-2">
            <h1 class="text-3xl font-extrabold text-white mb-2 tracking-tight">דוח מניות היסטורי</h1>
            <p class="text-sm text-trading-textMuted">הזן סימולים כדי לייצר גיליון נתונים מאוחד</p>
        </div>

        <form id="stockForm" class="space-y-6">
            
            <div>
                <label for="tickers" class="block text-sm font-medium mb-2 text-trading-textMuted">סימולי מניות (מופרדים בפסיק)</label>
                <input type="text" id="tickers" name="tickers" placeholder="לדוגמה: AAPL, MSFT, TSLA" required
                    class="w-full px-4 py-3 bg-trading-input border border-trading-border rounded-xl focus:ring-2 focus:ring-trading-primary focus:border-transparent outline-none transition-all dir-ltr text-left uppercase text-white font-mono tracking-wider shadow-inner">
            </div>

            <div class="grid grid-cols-2 gap-5">
                <div>
                    <label for="startDate" class="block text-sm font-medium mb-2 text-trading-textMuted">תאריך התחלה</label>
                    <input type="date" id="startDate" name="startDate" required
                        class="w-full px-4 py-3 bg-trading-input border border-trading-border rounded-xl focus:ring-2 focus:ring-trading-primary focus:border-transparent outline-none text-white transition-all">
                </div>

                <div>
                    <label for="endDate" class="block text-sm font-medium mb-2 text-trading-textMuted">תאריך סיום</label>
                    <input type="date" id="endDate" name="endDate" required
                        class="w-full px-4 py-3 bg-trading-input border border-trading-border rounded-xl focus:ring-2 focus:ring-trading-primary focus:border-transparent outline-none text-white transition-all">
                </div>
            </div>

            <div>
                <label for="frequency" class="block text-sm font-medium mb-2 text-trading-textMuted">תדירות נתונים</label>
                <select id="frequency" name="frequency" required
                    class="w-full px-4 py-3 bg-trading-input border border-trading-border rounded-xl focus:ring-2 focus:ring-trading-primary focus:border-transparent outline-none text-white transition-all appearance-none cursor-pointer">
                    <option value="1d">יומי (Daily)</option>
                    <option value="1wk">שבועי (Weekly)</option>
                    <option value="1mo">חודשי (Monthly)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" 
                class="w-full bg-trading-primary hover:bg-blue-600 text-white font-bold py-4 rounded-xl shadow-[0_0_15px_rgba(59,130,246,0.4)] transition-all flex justify-center items-center gap-3 mt-2 transform hover:-translate-y-0.5">
                <span id="btnText" class="text-lg">הפק דוח נתונים</span>
                <svg id="loadingIcon" class="hidden animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div id="errorContainer" class="hidden mt-6 p-4 bg-red-900/40 border border-red-500/50 text-red-200 rounded-xl text-sm text-center flex flex-col items-center gap-2">
            <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span id="errorText"></span>
        </div>

        <div id="resultContainer" class="hidden mt-8 pt-8 border-t border-trading-border text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-trading-success/20 mb-4 shadow-[0_0_20px_rgba(16,185,129,0.2)]">
                <svg class="w-8 h-8 text-trading-success" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">הנתונים נמשכו בהצלחה!</h3>
            <p class="text-sm text-trading-textMuted mb-6">גיליון הנתונים המאוחד שלך מוכן לעבודה.</p>
            
            <a id="sheetLink" href="#" target="_blank" rel="noopener noreferrer"
                class="inline-block w-full bg-trading-success hover:bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.4)] transition-all text-decoration-none text-lg transform hover:-translate-y-0.5">
                פתח גיליון מניות ב-Google Sheets
            </a>
        </div>

    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwDK_hPUTIRNHN86Ld-AVXObIHSeJiHf21UQ-TZwPzyKm-RYfWGDHP9Gsu-SRq2gj9_ZA/exec';

        const form = document.getElementById('stockForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingIcon = document.getElementById('loadingIcon');
        const resultContainer = document.getElementById('resultContainer');
        const sheetLink = document.getElementById('sheetLink');
        const errorContainer = document.getElementById('errorContainer');
        const errorText = document.getElementById('errorText');

        // קביעת תאריך ברירת מחדל (היום ושנה אחורה)
        const today = new Date();
        const lastYear = new Date(new Date().setFullYear(today.getFullYear() - 1));
        document.getElementById('endDate').valueAsDate = today;
        document.getElementById('startDate').valueAsDate = lastYear;

        // פונקציית עזר להצגת שגיאות
        function showError(msg) {
            errorText.textContent = msg;
            errorContainer.classList.remove('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            // איפוס שגיאות והודעות קודמות
            errorContainer.classList.add('hidden');
            resultContainer.classList.add('hidden');

            const startDateInput = document.getElementById('startDate').value;
            const endDateInput = document.getElementById('endDate').value;
            const rawTickers = document.getElementById('tickers').value;

            // --- ולידציית צד לקוח (תאריכים ומניות) ---
            
            const startDate = new Date(startDateInput);
            const endDate = new Date(endDateInput);
            const currentDate = new Date();
            
            // איפוס שעות כדי להשוות רק תאריכים
            currentDate.setHours(0, 0, 0, 0); 
            endDate.setHours(0,0,0,0);

            if (startDate > endDate) {
                showError('תאריך ההתחלה לא יכול להיות מאוחר מתאריך הסיום.');
                return;
            }

            if (endDate > currentDate) {
                showError('תאריך הסיום לא יכול להיות תאריך עתידי.');
                return;
            }

            // בדיקה שהוזנו רק אותיות באנגלית, פסיקים ורווחים
            const tickersRegex = /^[A-Za-z0-9, \.]+$/;
            if (!tickersRegex.test(rawTickers)) {
                showError('אנא הזן סימולי מניות תקינים באנגלית בלבד (למשל: AAPL, TSLA).');
                return;
            }

            // ניקוי המערך
            const tickersArray = rawTickers.split(',').map(t => t.trim().toUpperCase()).filter(t => t !== '');
            if (tickersArray.length === 0) {
                showError('לא הוזנו מניות. אנא הזן לפחות סימול אחד.');
                return;
            }

            const payload = {
                tickers: tickersArray,
                startDate: startDateInput,
                endDate: endDateInput,
                frequency: document.getElementById('frequency').value
            };

            // מצב טעינה
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-wait');
            btnText.textContent = 'מושך נתונים מהשווקים...';
            loadingIcon.classList.remove('hidden');

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error('שגיאת רשת. בדוק את החיבור שלך.');
                }

                const data = await response.json();

                if (data.status === 'success') {
                    sheetLink.href = data.sheetUrl;
                    resultContainer.classList.remove('hidden');
                } else {
                    // טיפול חכם בשגיאות שמגיעות מהשרת (למשל, מניה לא קיימת)
                    let serverMsg = data.message || 'אירעה שגיאה בשרת.';
                    
                    if (serverMsg.includes('Failed to fetch data for')) {
                        // חילוץ שם המניה שנכשלה מתוך הודעת השגיאה של השרת
                        const match = serverMsg.match(/for ([A-Z0-9]+)/);
                        const failedTicker = match ? match[1] : 'שהזנת';
                        throw new Error(`המניה ${failedTicker} לא קיימת, נמחקה או שאין עבורה נתונים בטווח התאריכים. ודא שהסימול תקין.`);
                    } else {
                        throw new Error(serverMsg);
                    }
                }

            } catch (error) {
                showError(error.message);
            } finally {
                // שחרור כפתור
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-wait');
                btnText.textContent = 'הפק דוח נתונים';
                loadingIcon.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
